version: "3.8"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: employee_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  eureka-server:
    build:
      context: ./eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: ./api-gateway
    restart: unless-stopped
    depends_on:
      - eureka-server
    ports:
      - "8080:8080"

  employee-service:
    build:
      context: ./employee-service
    restart: unless-stopped
    depends_on:
      - mysql
      - eureka-server
    environment:
      DB_HOST: mysql
      DB_NAME: employee_db
      EUREKA_URI: http://eureka-server:8761/eureka
    ports:
      - "8081:8081"

  department-service:
    build:
      context: ./department-service
    restart: unless-stopped
    depends_on:
      - mysql
      - eureka-server
    environment:
      DB_HOST: mysql
      DB_NAME: department_db
      EUREKA_URI: http://eureka-server:8761/eureka
    ports:
      - "8082:8082"

  payroll-service:
    build:
      context: ./payroll-service
    restart: unless-stopped
    depends_on:
      - mysql
      - eureka-server
    environment:
      DB_HOST: mysql
      DB_NAME: payroll_db
      EUREKA_URI: http://eureka-server:8761/eureka
    ports:
      - "8083:8083"

volumes:
  mysql-data:
